name: Update GitHub stats

on:
  schedule:
    - cron: "17 1 * * *"
  workflow_dispatch:
  push:
    branches: [master]
    paths: [scripts/generate_stats.py]

permissions:
  contents: write

jobs:
  stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate stats SVGs
        run: python3 scripts/generate_stats.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit refreshed stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets
          git diff --cached --quiet || { git commit -m "chore: refresh GitHub stats"; git push; }
